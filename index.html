<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locais de Estágio — IF Baiano GMB</title>

<script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

  header { background: #166534; color: white; padding: 18px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 12px; opacity: .7; margin-top: 1px; }
  .header-right { margin-left: auto; font-size: 11px; opacity: .6; text-align: right; }

  .top-bar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .top-bar label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 4px; }
  select, input[type=text] { font-family: 'Inter', sans-serif; font-size: 13px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 8px 11px; color: #1e293b; outline: none; transition: border-color .15s; width: 100%; }
  select:focus, input:focus { border-color: #16a34a; background: #fff; }
  select { cursor: pointer; }
  .fg { display: flex; flex-direction: column; }
  .fg-curso { width: 280px; } .fg-cidade { width: 200px; } .fg-busca { width: 220px; } .fg-status { width: 170px; }
  .btn-limpar { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: 7px; border: 1.5px solid #e2e8f0; background: none; cursor: pointer; color: #64748b; align-self: flex-end; transition: all .15s; }
  .btn-limpar:hover { border-color: #16a34a; color: #15803d; background: #f0fdf4; }
  .btn-reload { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: 7px; border: 1.5px solid #bbf7d0; background: #f0fdf4; cursor: pointer; color: #15803d; align-self: flex-end; transition: all .15s; }
  .btn-reload:hover { background: #dcfce7; border-color: #16a34a; }

  .tabs { padding: 12px 24px 0; display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 6px 6px 0 0; border: 1.5px solid transparent; background: none; cursor: pointer; color: #64748b; transition: all .15s; }
  .tab.ativo { background: #fff; border-color: #e2e8f0; border-bottom-color: #fff; color: #166534; font-weight: 600; }
  .tab:not(.ativo):hover { background: #e2e8f0; color: #1e293b; }

  .conteudo { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 0 8px 8px 8px; margin: 0 24px 24px; overflow: hidden; }
  .resultado-info { padding: 10px 16px; font-size: 12px; color: #64748b; border-bottom: 1px solid #f1f5f9; background: #f8fafc; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .resultado-info strong { color: #1e293b; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 14px; background: #f8fafc; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 14px; vertical-align: middle; }

  .local-nome { font-weight: 600; color: #0f172a; }
  .concedente { font-size: 11px; color: #64748b; margin-top: 2px; }

  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
  .badge-valido   { background: #dcfce7; color: #15803d; }
  .badge-proximo  { background: #fef3c7; color: #b45309; }
  .badge-expirado { background: #fee2e2; color: #b91c1c; }
  .badge-sem_data { background: #f1f5f9; color: #64748b; }

  .contato { font-size: 11px; color: #475569; }
  .contato a { color: #2563eb; text-decoration: none; }
  .contato a:hover { text-decoration: underline; }

  .fim-date { font-size: 11.5px; }
  .fim-date.expirado { color: #b91c1c; }
  .fim-date.valido   { color: #15803d; }
  .fim-date.proximo  { color: #b45309; }

  .loading { padding: 48px 20px; text-align: center; color: #64748b; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #16a34a; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .erro { padding: 40px 20px; text-align: center; color: #b91c1c; font-size: 14px; }
  .vazio { padding: 48px 20px; text-align: center; color: #94a3b8; font-size: 14px; }
  .ultima-atualizacao { font-size: 11px; color: #94a3b8; }

  /* Estilo do botão de Gerar Ateste */
  .btn-gerar-docx { background-color: #166534; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; transition: background 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .btn-gerar-docx:hover { background-color: #15803d; }
  .btn-gerar-docx:active { transform: scale(0.97); }

@media (max-width: 640px) {
    .fg-curso, .fg-cidade, .fg-busca, .fg-status { width: 100%; }
    .tabs { padding: 10px 12px 0; }
    
    /* Remove a borda da caixa principal para os cartões fluírem */
    .conteudo { margin: 0 12px 20px; border: none; background: transparent; overflow: visible; }
    .resultado-info { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; }
    
    /* Transforma a Tabela em Cartões */
    table { display: block; border: none; }
    thead { display: none; } /* Esconde o cabeçalho original */
    tbody { display: flex; flex-direction: column; gap: 14px; }
    
    tr { 
        display: flex; flex-direction: column;
        background: #fff; border: 1.5px solid #e2e8f0; 
        border-radius: 8px; padding: 16px; 
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    tr:hover { background: #fff; } /* Tira o efeito de passar o mouse */
    
    td { padding: 4px 0; border: none; text-align: left; }
    
    /* Estilo do Título (Nome da Empresa) */
    td:nth-child(1) { border-bottom: 1px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 8px; }
    .local-nome { font-size: 15px; }
    
    /* Coloca legendas automáticas antes dos textos */
    td:nth-child(2)::before { content: "CURSO: "; font-weight: 700; font-size: 10px; color: #94a3b8; }
    td:nth-child(3)::before { content: "CIDADE: "; font-weight: 700; font-size: 10px; color: #94a3b8; }
    td:nth-child(4)::before { content: "VALIDADE: "; font-weight: 700; font-size: 10px; color: #94a3b8; }
    
    /* Etiqueta de Status */
    td:nth-child(5) { margin-top: 4px; margin-bottom: 8px; }
    
    /* Bloco de Contato */
    td:nth-child(6) { border-top: 1px solid #f1f5f9; padding-top: 12px; margin-top: 4px; }
    td:nth-child(6)::before { content: "CONTATO:"; font-weight: 700; font-size: 10px; color: #94a3b8; display: block; margin-bottom: 2px; }
    
    /* Botão de Emitir (Fica grande no final do cartão) */
    td:nth-child(7) { padding-top: 8px; }
    .btn-gerar-docx { width: 100%; justify-content: center; padding: 14px; font-size: 14px; margin-top: 8px; }
  }
</style>
</head>
<body>

<header>
  <div>🌱</div>
  <div>
    <h1>Locais de Estágio</h1>
    <p>IF Baiano — Campus Governador Mangabeira</p>
  </div>
  <div class="header-right" id="ultimaAtualizacao"></div>
</header>

<div class="top-bar">
  <div class="fg fg-curso">
    <label>Curso</label>
    <select id="selCurso" onchange="filtrar()" disabled><option value="">Carregando...</option></select>
  </div>
  <div class="fg fg-cidade">
    <label>Cidade</label>
    <select id="selCidade" onchange="filtrar()" disabled><option value="">Carregando...</option></select>
  </div>
  <div class="fg fg-busca">
    <label>Buscar</label>
    <input type="text" id="busca" placeholder="Nome do local ou empresa..." oninput="filtrar()" disabled>
  </div>
  <div class="fg fg-status">
    <label>Mostrar</label>
    <select id="selMostrar" onchange="filtrar()" disabled>
      <option value="">Todos os status</option>
      <option value="valido">✅ Somente válidos</option>
      <option value="proximo">⚠️ Próximos do venc.</option>
      <option value="expirado">❌ Somente expirados</option>
    </select>
  </div>
  <button class="btn-limpar" onclick="limpar()">✕ Limpar</button>
  <button class="btn-reload" onclick="carregarDados()">↻ Atualizar</button>
</div>

<div class="tabs" id="tabs">
  <button class="tab ativo" data-tab="todos" onclick="mudarTab(this)">Todos</button>
  <button class="tab" data-tab="valido" onclick="mudarTab(this)">✅ Válidos</button>
  <button class="tab" data-tab="proximo" onclick="mudarTab(this)">⚠️ A vencer</button>
  <button class="tab" data-tab="expirado" onclick="mudarTab(this)">❌ Expirados</button>
</div>

<div class="conteudo">
  <div class="resultado-info" id="resultInfo"></div>
  <div id="estadoContainer">
    <div class="loading">
      <div class="spinner"></div>
      Buscando dados da planilha...
    </div>
  </div>
  <table id="tabela" style="display:none">
    <thead>
      <tr>
        <th>Local / Empresa</th>
        <th>Curso</th>
        <th>Cidade</th>
        <th>Validade</th>
        <th>Status</th>
        <th>Contato</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const URL_T1 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLGLd6VicHaXxND5GBNkr1lTA-2Lrw-iU79BA3KPQI4TBDQGTTFAgBX0cwfLUICQq3lSUDdURitobb/pub?gid=1034620908&single=true&output=csv';
const URL_T2 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLGLd6VicHaXxND5GBNkr1lTA-2Lrw-iU79BA3KPQI4TBDQGTTFAgBX0cwfLUICQq3lSUDdURitobb/pub?gid=0&single=true&output=csv';

const LABEL = {valido:'✅ Válido', proximo:'⚠️ A vencer', expirado:'❌ Expirado', sem_data:'— Sem data'};
const RANK  = {valido:0, proximo:1, expirado:2, sem_data:3};

let DADOS = [];
let RESULTADO_ATUAL = []; 
let tabAtual = 'todos';

function fixEncoding(str) { try { return decodeURIComponent(escape(str)); } catch(e) { return str; } }

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rawHeaders = splitCSVLine(lines[0]).map(h => fixEncoding(h.trim().replace(/^"|"$/g,'')));
  const headers = []; const seen = new Set();
  rawHeaders.forEach(h => { if (!seen.has(h)) { headers.push(h); seen.add(h); } else { headers.push(h + '__dup'); } });
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line).map(v => fixEncoding(v.trim().replace(/^"|"$/g,'')));
    const obj = {};
    headers.forEach((h, i) => { if (!h.endsWith('__dup')) obj[h] = vals[i] || ''; });
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function splitCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; } else if (c === ',' && !inQ) { result.push(cur); cur = ''; } else { cur += c; }
  }
  result.push(cur); return result;
}

function parseDate(dateStr) {
  if (!dateStr || dateStr.trim() === '') return null;
  const str = dateStr.trim();
  const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) {
    const d = new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2])-1, parseInt(isoMatch[3]));
    if (!isNaN(d)) return d;
  }
  const parts = str.split(/[\/\-]/);
  if (parts.length === 3) {
    const [a, b, c] = parts.map(Number);
    if (parts[0].length === 4) { const d = new Date(a, b-1, c); if (!isNaN(d)) return d; }
    if (parts[2].length === 4) {
      let dia, mes;
      if (a > 12) { dia = a; mes = b; } else if (b > 12) { dia = b; mes = a; } else { dia = a; mes = b; }
      const d = new Date(c, mes-1, dia); if (!isNaN(d)) return d;
    }
  } return null;
}

function calcStatus(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return 'sem_data';
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diff = Math.floor((d - hoje) / 86400000);
  if (diff < 0)   return 'expirado';
  if (diff <= 90) return 'proximo';
  return 'valido';
}

function formatDate(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return '';
  return d.toLocaleDateString('pt-BR');
}

async function carregarDados() {
  mostrarEstado('loading');
  document.getElementById('ultimaAtualizacao').textContent = '';
  desabilitarFiltros(true);

  try {
    const [r1, r2] = await Promise.all([fetch(URL_T1 + '&t=' + Date.now()), fetch(URL_T2 + '&t=' + Date.now())]);
    if (!r1.ok || !r2.ok) throw new Error('Erro ao buscar planilha');

    const [csv1, csv2] = await Promise.all([r1.text(), r2.text()]);
    const t1 = parseCSV(csv1); 
    const t2 = parseCSV(csv2); 

    const empresas = {};
    t1.forEach(row => {
      let nome = '';
      for (let key in row) {
        if (key.toLowerCase().includes('razão') || key.toLowerCase().includes('razao') || key.toLowerCase().includes('nome')) {
          nome = row[key];
          break;
        }
      }
      if (!nome) nome = Object.values(row)[2] || '';
      
      if (nome.trim()) { 
         empresas[nome.trim().toLowerCase()] = row; 
      }
    });

    const visto = new Map();
    const processados = [];

    t2.forEach(row => {
      const concedente = (row['Nome/Razão social'] || row['Nome/RazÃ£o social'] || '').trim();
      const local      = (row['local para estagio'] || '').trim();
      const curso      = (row['Curso'] || '').trim();
      const fimRaw     = row['vigencia - fim'] || '';
      const status     = calcStatus(fimRaw);
      const fim        = formatDate(fimRaw);

      if (!concedente && !local && !curso) return; 

      const nomeConcLimpo = concedente.toLowerCase();
      let emp = empresas[nomeConcLimpo];
      if (!emp) {
         for (let key in empresas) {
            if (key.includes(nomeConcLimpo) || nomeConcLimpo.includes(key)) {
               emp = empresas[key];
               break;
            }
         }
      }
      emp = emp || {};

      let cnpj = '', endereco = '', telefone = '', email = '', cidadeEmp = '';
      
      for (let key in emp) {
        const k = key.toLowerCase();
        // AGORA BUSCANDO PELA COLUNA EXATA DE IDENTIFICAÇÃO CADASTRAL
        if (k.includes('identificação cadastral') || k.includes('identificacao cadastral') || k.includes('cnpj')) cnpj = emp[key];
        else if (k.includes('endereço') || k.includes('endereco')) endereco = emp[key];
        else if (k.includes('telefone') || k.includes('fone')) telefone = emp[key];
        else if (k.includes('email') || k.includes('e-mail')) email = emp[key];
        else if (k.includes('cidade')) cidadeEmp = emp[key];
      }

      const cidade = cidadeEmp.trim();

      const keyMap = `${concedente.toLowerCase()}|${local.toLowerCase()}|${curso.toLowerCase()}|${cidade.toLowerCase()}`;
      if (visto.has(keyMap)) {
        const prev = visto.get(keyMap);
        if (RANK[status] < RANK[prev.status]) { prev.status = status; prev.fim = fim; }
        return;
      }

      const obj = { 
        concedente, 
        local, 
        curso, 
        cidade, 
        endereco: endereco.trim() || cidade, 
        cnpj: cnpj.trim(), 
        email: email.trim(), 
        telefone: telefone.trim(), 
        fim, 
        status 
      };
      
      visto.set(keyMap, obj); processados.push(obj);
    });

    DADOS = processados; popularFiltros(); desabilitarFiltros(false); filtrar();
    document.getElementById('ultimaAtualizacao').textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
  } catch (err) { mostrarEstado('erro'); }
}

function mostrarEstado(estado) {
  const ec = document.getElementById('estadoContainer');
  document.getElementById('tabela').style.display = 'none';
  if (estado === 'loading') { ec.innerHTML = `<div class="loading"><div class="spinner"></div>Buscando dados da planilha...</div>`; ec.style.display = 'block'; } 
  else if (estado === 'erro') { ec.innerHTML = `<div class="erro"><div class="icone">⚠️</div>Não foi possível carregar os dados.<br><br><button class="btn-reload" onclick="carregarDados()" style="margin:0 auto">↻ Tentar novamente</button></div>`; ec.style.display = 'block'; } 
  else { ec.style.display = 'none'; }
}

function desabilitarFiltros(sim) { ['selCurso','selCidade','busca','selMostrar'].forEach(id => { document.getElementById(id).disabled = sim; }); }

function popularFiltros() {
  const cursos  = [...new Set(DADOS.map(d=>d.curso).filter(Boolean))].sort();
  const cidades = [...new Set(DADOS.map(d=>d.cidade).filter(Boolean))].sort();
  const sc = document.getElementById('selCurso'); const sd = document.getElementById('selCidade');
  sc.innerHTML = '<option value="">Todos os cursos</option>'; sd.innerHTML = '<option value="">Todas as cidades</option>';
  cursos.forEach(c  => { const o=document.createElement('option'); o.value=c; o.textContent=c; sc.appendChild(o); });
  cidades.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sd.appendChild(o); });
}

function filtrar() {
  const curso   = document.getElementById('selCurso').value.toLowerCase();
  const cidade  = document.getElementById('selCidade').value.toLowerCase();
  const busca   = document.getElementById('busca').value.toLowerCase().trim();
  const mostrar = document.getElementById('selMostrar').value;

  let resultado = DADOS.filter(d => {
    if (tabAtual !== 'todos' && d.status !== tabAtual) return false;
    if (mostrar && d.status !== mostrar) return false;
    if (curso  && d.curso.toLowerCase()  !== curso)  return false;
    if (cidade && d.cidade.toLowerCase() !== cidade) return false;
    if (busca) {
      const h = (d.local+' '+d.concedente+' '+d.cidade+' '+d.curso).toLowerCase();
      if (!h.includes(busca)) return false;
    } return true;
  });

  resultado.sort((a,b) => RANK[a.status]-RANK[b.status] || a.local.localeCompare(b.local, 'pt-BR'));
  RESULTADO_ATUAL = resultado; 

  const tbody = document.getElementById('tbody');
  const info  = document.getElementById('resultInfo');
  const tabela = document.getElementById('tabela');
  const ec = document.getElementById('estadoContainer');

  if (resultado.length === 0) {
    tbody.innerHTML = ''; tabela.style.display = 'none';
    ec.innerHTML = `<div class="vazio"><div class="icone">🔍</div>Nenhum local encontrado com os filtros selecionados.</div>`; ec.style.display = 'block';
    info.innerHTML = 'Nenhum resultado.';
  } else {
    ec.style.display = 'none'; tabela.style.display = 'table';
    const v = resultado.filter(r=>r.status==='valido').length;
    const p = resultado.filter(r=>r.status==='proximo').length;
    info.innerHTML = `<span><strong>${resultado.length}</strong> de ${DADOS.length} registro(s) — <span style="color:#15803d">${v} válido(s)</span>${p>0?` · <span style="color:#b45309">${p} a vencer</span>`:''}</span>`;

    tbody.innerHTML = resultado.map((d, index) => {
      const contato = [ d.email ? `<a href="mailto:${d.email}">${d.email}</a>` : '', d.telefone || '' ].filter(Boolean).join('<br>');
      return `<tr>
        <td><div class="local-nome">${d.local}</div>${d.concedente !== d.local ? `<div class="concedente">${d.concedente}</div>` : ''}</td>
        <td style="color:#334155">${d.curso}</td>
        <td style="color:#334155">${d.cidade || '<span style="color:#94a3b8">—</span>'}</td>
        <td><span class="fim-date ${d.status}">${d.fim || '—'}</span></td>
        <td><span class="badge badge-${d.status}">${LABEL[d.status]}</span></td>
        <td class="contato">${contato || '<span style="color:#94a3b8">—</span>'}</td>
        <td><button class="btn-gerar-docx" onclick="gerarAtesteDOCX(this, ${index})">📄 Emitir</button></td>
      </tr>`;
    }).join('');
  }
}

function mudarTab(btn) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo')); btn.classList.add('ativo'); tabAtual = btn.dataset.tab; filtrar(); }
function limpar() { document.getElementById('selCurso').value = ''; document.getElementById('selCidade').value = ''; document.getElementById('busca').value = ''; document.getElementById('selMostrar').value = ''; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo')); document.querySelector('[data-tab="todos"]').classList.add('ativo'); tabAtual = 'todos'; filtrar(); }

function replaceErrors(key, value) {
  if (value instanceof Error) {
      return Object.getOwnPropertyNames(value).reduce(function(error, key) {
          error[key] = value[key];
          return error;
      }, {});
  }
  return value;
}

function errorHandler(error) {
  console.log(JSON.stringify({error: error}, replaceErrors));

  if (error.properties && error.properties.errors instanceof Array) {
      const errorMessages = error.properties.errors.map(function (error) {
          return error.properties.explanation;
      }).join("\n\n");
      
      alert(`⚠️ ENCONTRAMOS O PROBLEMA NO ARQUIVO WORD:\n\n${errorMessages}\n\nDICA: Abra o modelo_ateste.docx no Google Docs, apague essa variável que deu erro e digite ela novamente.`);
  } else {
      alert(`Ops! Erro ao processar o arquivo.\n\nDetalhe: ${error.message}`);
  }
  throw error;
}

async function gerarAtesteDOCX(btn, index) {
  const d = RESULTADO_ATUAL[index];
  
  const textoOriginal = btn.innerHTML;
  btn.innerHTML = '⏳ Gerando...';
  btn.disabled = true;

  try {
      const resposta = await fetch('./modelo_ateste.docx?v=' + new Date().getTime());
      
      if (!resposta.ok) {
          throw new Error(`Arquivo modelo_ateste.docx não encontrado no servidor.`);
      }

      const dadosBinarios = await resposta.arrayBuffer();
      const zip = new window.PizZip(dadosBinarios);
      
      let doc;
      try {
          doc = new window.docxtemplater(zip, {
              paragraphLoop: true,
              linebreaks: true,
              delimiters: {start: '{', end: '}'}
          });
      } catch (error) {
          errorHandler(error);
      }

      // Preenche os dados
      doc.render({
          empresa: d.concedente || "_________________",
          localest: d.local || "_________________",
          telemp: d.telefone || "________",
          emailemp: d.email || "________",
          cnpj: d.cnpj || "_________________",
          endemp: d.endereco || d.cidade || "_________________"
      });

      const out = doc.getZip().generate({
          type: "blob",
          mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
      });

      const nomeArquivo = `Ateste_${(d.local || "Empresa").replace(/[^a-zA-Z0-9]/g, '_')}.docx`;
      saveAs(out, nomeArquivo);

  } catch (erro) {
      if(!erro.properties){ 
          console.error(erro);
          alert(`Erro na geração: ${erro.message}`);
      }
  } finally {
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
  }
}

// Iniciar
carregarDados();
</script>
