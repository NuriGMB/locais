<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locais de Estágio</title>
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }
  header { background: #166534; color: white; padding: 18px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header p { font-size: 12px; opacity: .7; margin-top: 1px; }
  .top-bar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .top-bar label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 4px; }
  select, input[type=text] { font-family: 'Inter', sans-serif; font-size: 13px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 8px 11px; color: #1e293b; outline: none; transition: border-color .15s; width: 100%; }
  select:focus, input:focus { border-color: #16a34a; background: #fff; }
  select { cursor: pointer; }
  .fg { display: flex; flex-direction: column; }
  .fg-curso { width: 280px; } .fg-cidade { width: 200px; } .fg-busca { width: 220px; } .fg-status { width: 170px; }
  .btn-limpar { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 14px; border-radius: 7px; border: 1.5px solid #e2e8f0; background: none; cursor: pointer; color: #64748b; align-self: flex-end; transition: all .15s; }
  .btn-limpar:hover { border-color: #16a34a; color: #15803d; background: #f0fdf4; }
  .tabs { padding: 12px 24px 0; display: flex; gap: 4px; }
  .tab { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 6px 6px 0 0; border: 1.5px solid transparent; background: none; cursor: pointer; color: #64748b; transition: all .15s; }
  .tab.ativo { background: #fff; border-color: #e2e8f0; border-bottom-color: #fff; color: #166534; font-weight: 600; }
  .tab:not(.ativo):hover { background: #e2e8f0; color: #1e293b; }
  .conteudo { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 0 8px 8px 8px; margin: 0 24px 24px; overflow: hidden; }
  .resultado-info { padding: 10px 16px; font-size: 12px; color: #64748b; border-bottom: 1px solid #f1f5f9; background: #f8fafc; }
  .resultado-info strong { color: #1e293b; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 14px; background: #f8fafc; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 14px; vertical-align: top; }
  .local-nome { font-weight: 600; color: #0f172a; }
  .concedente { font-size: 11px; color: #64748b; margin-top: 2px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
  .badge-valido   { background: #dcfce7; color: #15803d; }
  .badge-proximo  { background: #fef3c7; color: #b45309; }
  .badge-expirado { background: #fee2e2; color: #b91c1c; }
  .badge-sem_data { background: #f1f5f9; color: #64748b; }
  .contato { font-size: 11px; color: #475569; }
  .contato a { color: #2563eb; text-decoration: none; }
  .contato a:hover { text-decoration: underline; }
  .fim-date { font-size: 11.5px; }
  .fim-date.expirado { color: #b91c1c; }
  .fim-date.valido   { color: #15803d; }
  .fim-date.proximo  { color: #b45309; }
  .vazio { padding: 48px 20px; text-align: center; color: #94a3b8; font-size: 14px; }
  .vazio .icone { font-size: 36px; margin-bottom: 10px; }
  @media (max-width: 640px) {
    .fg-curso, .fg-cidade, .fg-busca, .fg-status { width: 100%; }
    .tabs { padding: 10px 12px 0; }
    .conteudo { margin: 0 12px 20px; }
    .top-bar { padding: 12px; }
    table { display: block; overflow-x: auto; }
  }
</style>
</head>

<header>

<div class="tabs" id="tabs">

<div class="conteudo">

const LABEL = {valido:'✅ Válido', proximo:'⚠️ A vencer', expirado:'❌ Expirado', sem_data:'— Sem data'};
let tabAtual = 'todos';
const cursos = [...new Set(DADOS.map(d=>d.curso).filter(Boolean))].sort();
const cidades = [...new Set(DADOS.map(d=>d.cidade).filter(Boolean))].sort();
const sc = document.getElementById('selCurso');
const scid = document.getElementById('selCidade');
cursos.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; sc.appendChild(o); });
cidades.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; scid.appendChild(o); });
function mudarTab(btn) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo')); btn.classList.add('ativo'); tabAtual=btn.dataset.tab; filtrar(); }
function filtrar() {
  const curso=document.getElementById('selCurso').value.toLowerCase();
  const cidade=document.getElementById('selCidade').value.toLowerCase();
  const busca=document.getElementById('busca').value.toLowerCase().trim();
  const mostrar=document.getElementById('selMostrar').value;
  let resultado=DADOS.filter(d=>{
    if(tabAtual!=='todos'&&d.status!==tabAtual)return false;
    if(mostrar&&d.status!==mostrar)return false;
    if(curso&&d.curso.toLowerCase()!==curso)return false;
    if(cidade&&d.cidade.toLowerCase()!==cidade)return false;
    if(busca){const h=(d.local+' '+d.concedente+' '+d.cidade+' '+d.curso).toLowerCase();if(!h.includes(busca))return false;}
    return true;
  });
  const rank={valido:0,proximo:1,expirado:2,sem_data:3};
  resultado.sort((a,b)=>rank[a.status]-rank[b.status]||a.local.localeCompare(b.local));
  const tbody=document.getElementById('tbody');
  const vazio=document.getElementById('vazio');
  const info=document.getElementById('resultInfo');
  if(resultado.length===0){tbody.innerHTML='';vazio.style.display='block';document.getElementById('tabela').style.display='none';info.innerHTML='Nenhum resultado.';}
  else{
    vazio.style.display='none';document.getElementById('tabela').style.display='table';
    const v=resultado.filter(r=>r.status==='valido').length;
    const p=resultado.filter(r=>r.status==='proximo').length;
    info.innerHTML=`<strong>${resultado.length}</strong> registro(s) — <span style="color:#15803d">${v} válido(s)</span>${p>0?` · <span style="color:#b45309">${p} a vencer</span>`:''}`;
    tbody.innerHTML=resultado.map(d=>{
      const contato=[d.email?`<a href="mailto:${d.email}">${d.email}</a>`:'',d.telefone||''].filter(Boolean).join('<br>');
      return `<tr><td><div class="local-nome">${d.local}</div><div class="concedente">${d.concedente!==d.local?d.concedente:''}</div></td><td>${d.curso}</td><td>${d.cidade||'<span style="color:#94a3b8">—</span>'}</td><td><span class="fim-date ${d.status}">${d.fim||'—'}</span></td><td><span class="badge badge-${d.status}">${LABEL[d.status]}</span></td><td class="contato">${contato||'<span style="color:#94a3b8">—</span>'}</td></tr>`;
    }).join('');
  }
}
